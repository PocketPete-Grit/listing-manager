<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Activity — AI Receptionist</title>
<style>
:root{--b:#1f6feb;--bg:#f6f8fa;--card:#fff;--line:#d8dee4;--txt:#1f2328;--mut:#656d76;--red:#cf222e;--grn:#1a7f37}
*{box-sizing:border-box}
body{margin:0;font:15px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt)}
.wrap{max-width:880px;margin:0 auto;padding:16px}
h1{font-size:20px;margin:8px 0 2px}
.sub{color:var(--mut);font-size:13px;margin-bottom:14px}
.nav a{font-size:13px;color:var(--b);text-decoration:none;font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:10px}
.btn{display:inline-block;border:0;border-radius:8px;padding:9px 14px;font:inherit;font-weight:600;cursor:pointer;background:var(--b);color:#fff}
.btn.sec{background:#eef1f4;color:var(--txt)}
input,select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font:inherit;background:#fff}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 13px;font-size:13px;font-weight:600;cursor:pointer;color:var(--mut)}
.chip.on{background:var(--b);border-color:var(--b);color:#fff}
.row1{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.meta{font-size:12px;color:var(--mut)}
.tag{display:inline-block;border-radius:6px;padding:1px 8px;font-size:11px;font-weight:700;margin-left:6px;vertical-align:1px}
.t-flag{background:#ffebe9;color:var(--red)}
.t-sent{background:#eef1f4;color:var(--mut)}
.t-list{background:#e7f0ff;color:#0b4dba;cursor:pointer}
.who{font-weight:700;font-size:14px;color:#0b2240}
.body{margin-top:6px;font-size:14px;line-height:1.55}
details{margin-top:8px}
summary{cursor:pointer;font-size:13px;color:var(--b);font-weight:600}
pre{white-space:pre-wrap;font-size:12px;background:#f6f8fa;border-radius:8px;padding:10px;margin:6px 0 0}
audio{width:100%;margin-top:8px;height:34px}
#msg{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1f2328;color:#fff;padding:10px 18px;border-radius:8px;display:none;z-index:9}
.empty{color:var(--mut);text-align:center;padding:30px 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="nav">← <a href="index.html">Listing Manager</a></div>
  <h1>📋 Activity</h1>
  <div class="sub">Every call and text the AI receptionist has handled — transcripts, recordings, and feedback.</div>

  <div id="login" class="card" style="display:none">
    <label style="display:block;font-size:13px;font-weight:600;margin-bottom:4px" for="pw">Password</label>
    <input id="pw" type="password" style="width:100%">
    <div style="margin-top:10px"><button class="btn" id="loginbtn">Sign in</button></div>
  </div>

  <div id="app" style="display:none">
    <div class="row1">
      <input id="q" placeholder="Search what was said…" style="flex:1;min-width:160px">
      <select id="listing"><option value="">All listings</option></select>
      <select id="days">
        <option value="">All time</option>
        <option value="1">Today</option>
        <option value="7" selected>Last 7 days</option>
        <option value="30">Last 30 days</option>
      </select>
    </div>
    <div class="chips" id="chips">
      <span class="chip on" data-k="">All</span>
      <span class="chip" data-k="call">📞 Calls</span>
      <span class="chip" data-k="sms">💬 Texts</span>
      <span class="chip" data-k="feedback">📝 Feedback</span>
      <span class="chip" data-k="flagged">⚡ Flagged</span>
    </div>
    <div id="feed"></div>
    <div style="text-align:center;margin:14px 0 40px">
      <button class="btn sec" id="more" style="display:none">Load more</button>
    </div>
  </div>
  <div id="msg"></div>
</div>

<script>
"use strict";
const API_URL = "https://wxntrwlalvhwsueqbiys.supabase.co/functions/v1/listing-admin";
let PW = localStorage.getItem("la_pw") || "";
let kind = "", offset = 0;
const PAGE = 50;

const $ = (id) => document.getElementById(id);
function show(id){ ["login","app"].forEach(x => $(x).style.display = (x===id ? "" : "none")); }
function toast(t){ const m=$("msg"); m.textContent=t; m.style.display="block"; setTimeout(()=>m.style.display="none",2600); }

async function api(action, extra){
  const res = await fetch(API_URL, { method:"POST", headers:{ "content-type":"application/json" },
    body: JSON.stringify(Object.assign({action, password:PW}, extra||{})) });
  if (res.status===401){ PW=""; localStorage.removeItem("la_pw"); show("login"); throw new Error("Wrong password"); }
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  return d;
}

function fmtWhen(iso){
  const d = new Date(iso);
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}) + " " +
         d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}
function fmtDur(s){ if(!s) return ""; return ` · ${Math.floor(s/60)}m ${s%60}s`; }

function icon(a){
  if (a.metadata && a.metadata.feedback) return "📝";
  if (a.type === "call") return "📞";
  return a.direction === "outbound" ? "🤖💬" : "💬";
}
function whoLine(a){
  const from = (a.metadata && a.metadata.from) || (a.subject||"").replace("AI call — ","");
  if (a.type === "sms" && a.direction === "outbound") return "Riley replied";
  return from || "(unknown)";
}

function card(a){
  const c = document.createElement("div"); c.className = "card";
  const top = document.createElement("div");
  const who = document.createElement("span"); who.className = "who";
  who.textContent = `${icon(a)} ${whoLine(a)}`;
  top.appendChild(who);
  const flagged = a.metadata && (a.metadata.flagged===true || a.metadata.handoff===true || a.metadata.successful===false);
  if (flagged){ const t=document.createElement("span"); t.className="tag t-flag"; t.textContent="⚡ flagged"; top.appendChild(t); }
  if (a.metadata && a.metadata.sentiment){ const t=document.createElement("span"); t.className="tag t-sent"; t.textContent=a.metadata.sentiment; top.appendChild(t); }
  const prop = a.properties;
  if (prop && prop.address_line1){
    const t=document.createElement("span"); t.className="tag t-list"; t.textContent=prop.address_line1;
    t.onclick = () => { $("listing").value = a.property_id; reload(); };
    top.appendChild(t);
  }
  c.appendChild(top);

  const meta = document.createElement("div"); meta.className="meta";
  meta.textContent = fmtWhen(a.occurred_at) + fmtDur(a.duration_seconds);
  c.appendChild(meta);

  const body = document.createElement("div"); body.className="body";
  body.textContent = a.content || "(no content)";
  c.appendChild(body);

  if (a.metadata && a.metadata.recording_url){
    const au = document.createElement("audio"); au.controls = true; au.preload = "none"; au.src = a.metadata.recording_url;
    c.appendChild(au);
  }
  if (a.metadata && a.metadata.transcript){
    const det = document.createElement("details");
    const sum = document.createElement("summary"); sum.textContent = "Full transcript";
    const pre = document.createElement("pre"); pre.textContent = a.metadata.transcript;
    det.append(sum, pre); c.appendChild(det);
  }
  return c;
}

async function load(append){
  try {
    const d = await api("activity_list", {
      kind: kind || undefined,
      listing_id: $("listing").value || undefined,
      days: $("days").value || undefined,
      q: $("q").value.trim() || undefined,
      limit: PAGE, offset,
    });
    const feed = $("feed");
    if (!append) feed.textContent = "";
    if (!d.rows.length && !append){
      const e=document.createElement("div"); e.className="empty";
      e.textContent="Nothing here yet — activity appears as calls and texts come in.";
      feed.appendChild(e);
    }
    for (const a of d.rows) feed.appendChild(card(a));
    $("more").style.display = d.rows.length === PAGE ? "" : "none";
  } catch(e){ toast(e.message); }
}
function reload(){ offset = 0; load(false); }

async function boot(){
  show("app");
  try {
    const d = await api("list");
    for (const r of d.rows){
      const o=document.createElement("option"); o.value=r.id;
      o.textContent=r.address_line1 + (r.city ? ", "+r.city : "");
      $("listing").appendChild(o);
    }
  } catch(e){ /* listing dropdown is optional */ }
  const params = new URLSearchParams(location.search);
  if (params.get("listing")) $("listing").value = params.get("listing");
  reload();
}

$("loginbtn").onclick = ()=>{ PW=$("pw").value.trim(); localStorage.setItem("la_pw",PW); boot(); };
$("pw") && $("pw").addEventListener("keydown",(e)=>{ if(e.key==="Enter") $("loginbtn").click(); });
document.querySelectorAll(".chip").forEach((ch)=>{ ch.onclick=()=>{
  document.querySelectorAll(".chip").forEach((x)=>x.classList.remove("on"));
  ch.classList.add("on"); kind = ch.dataset.k; reload();
};});
let qt; $("q").addEventListener("input", ()=>{ clearTimeout(qt); qt=setTimeout(reload, 400); });
$("listing").onchange = reload;
$("days").onchange = reload;
$("more").onclick = ()=>{ offset += PAGE; load(true); };

if (PW) boot(); else show("login");
</script>
</body>
</html>
